<!DOCTYPE html>
<html lang="pt-PT">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Admin | Passatempo Yokimbo</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }


        .container {

            max-width: 1200px;
            margin: auto;

        }


        h1 {

            text-align: center;
            color: #2FA84F;

        }


        .stats {

            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;

        }


        .stats strong {

            font-size: 32px;
            color: #2FA84F;

        }


        table {

            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;

        }


        th {

            background: #2FA84F;
            color: white;
            padding: 12px;
            text-align: left;

        }


        td {

            padding: 10px;
            border-bottom: 1px solid #ddd;

        }


        tr:hover {

            background: #f0fff4;

        }


        .loading {

            text-align: center;
            padding: 20px;

        }


        @media(max-width:768px){

            table {

                font-size:12px;

            }

        }
.actions {

    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;

}


.actions button {

    background: #2FA84F;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;

}


.actions button:hover {

    opacity: 0.85;

}

    </style>

</head>


<body>


<div class="container">


<h1>
    Painel de Participantes Yokimbo
</h1>

<div class="actions">

    <button id="exportBtn">
        Exportar CSV
    </button>

    <button onclick="location.reload()">
        Atualizar
    </button>

</div>
<div class="actions">

    <button id="exportBtn">
        Exportar CSV
    </button>

    <button onclick="location.reload()">
        Atualizar
    </button>

</div>
<div class="stats">

    <p>Total de participantes</p>

    <strong id="total">
        0
    </strong>

</div>



<div class="loading" id="loading">

    A carregar participantes...

</div>



<table id="participantsTable" style="display:none;">


<thead>

<tr>

<th>Nome</th>
<th>Telefone</th>
<th>Email</th>
<th>Província</th>
<th>Instagram</th>
<th>Origem</th>
<th>Data</th>

</tr>

</thead>


<tbody id="participantsBody">

</tbody>


</table>



</div>



<script type="module" src="../js/admin.js"></script>


</body>

</html>
