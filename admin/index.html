<!DOCTYPE html>
<html lang="pt-PT">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Admin | Passatempo Yokimbo</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }


        .container {

            max-width: 1200px;
            margin: auto;

        }


        h1 {

            text-align: center;
            color: #2FA84F;

        }


        .topbar {

            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #333;

        }


        .topbar button {

            background: #c0392b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;

        }


        .topbar button:hover {

            opacity: 0.85;

        }


        .stats-row {

            display: flex;
            gap: 15px;
            margin-bottom: 20px;

        }


        .stats {

            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            flex: 1;

        }


        .stats strong {

            font-size: 32px;
            color: #2FA84F;

        }


        .search-box {

            margin-bottom: 20px;

        }


        .search-box input {

            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 14px;

        }


        table {

            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;

        }


        th {

            background: #2FA84F;
            color: white;
            padding: 12px;
            text-align: left;

        }


        td {

            padding: 10px;
            border-bottom: 1px solid #ddd;

        }


        tr:hover {

            background: #f0fff4;

        }


        .loading {

            text-align: center;
            padding: 20px;

        }


        @media(max-width:768px){

            table {

                font-size:12px;

            }

            .stats-row {

                flex-direction: column;

            }

        }


        .actions {

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;

        }


        .actions button {

            background: #2FA84F;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;

        }


        .actions button:hover {

            opacity: 0.85;

        }


        .modal-overlay {

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.6);
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
            box-sizing: border-box;

        }


        .modal-box {

            background: white;
            border-radius: 12px;
            padding: 25px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;

        }


        .modal-box h2 {

            text-align: center;
            color: #2FA84F;
            margin-top: 0;

        }


        .winner-item {

            background: #f0fff4;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;

        }


        .winner-item h3 {

            margin: 0 0 8px 0;
            color: #2FA84F;

        }


        .winner-item p {

            margin: 4px 0;
            font-size: 14px;

        }


        .modal-actions {

            display: flex;
            gap: 10px;
            margin-top: 15px;

        }


        .modal-actions button {

            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2FA84F;
            color: white;

        }


        .modal-actions button.secondary {

            background: #999;

        }


        .modal-actions button:hover {

            opacity: 0.85;

        }

    </style>

</head>


<body>
<div id="authLoading" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
font-size:20px;
z-index:9999;
">
Verificando acesso...
</div>

<div class="container" id="adminContent" style="display:none;">


<div class="topbar">

    <span id="userEmail"></span>

    <button id="logoutBtn">
        Sair
    </button>

</div>


<h1>
    Painel de Participantes Yokimbo
</h1>

<div class="actions">

    <button id="exportBtn">
        Exportar CSV
    </button>

    <button onclick="location.reload()">
        Atualizar
    </button>

    <button id="draw1Btn">
        Sortear 1 vencedor
    </button>

    <button id="draw3Btn">
        Sortear 3 vencedores
    </button>

    <button id="draw5Btn">
        Sortear 5 vencedores
    </button>

</div>


<div class="stats-row">

    <div class="stats">

        <p>Total de participantes</p>

        <strong id="total">
            0
        </strong>

    </div>

    <div class="stats">

        <p>Participantes ativos</p>

        <strong id="activeCount">
            0
        </strong>

    </div>

</div>


<div class="search-box">

    <input
        type="text"
        id="searchInput"
        placeholder="Pesquisar por nome, telefone, email, instagram ou província"
    >

</div>



<div class="loading" id="loading">

    A carregar participantes...

</div>



<table id="participantsTable" style="display:none;">


<thead>

<tr>

<th>Nome</th>
<th>Telefone</th>
<th>Email</th>
<th>Província</th>
<th>Instagram</th>
<th>Origem</th>
<th>Data</th>
<th>Status</th>

</tr>

</thead>


<tbody id="participantsBody">

</tbody>


</table>



</div>



<div class="modal-overlay" id="winnersModal">

    <div class="modal-box">

        <h2>🏆 Vencedores</h2>

        <div id="winnersList"></div>

        <div class="modal-actions">

            <button id="copyWinnersBtn">
                Copiar vencedores
            </button>

            <button id="closeWinnersModal" class="secondary">
                Fechar
            </button>

        </div>

    </div>

</div>



<script type="module" src="../js/admin-auth.js"></script>

<script type="module" src="../js/admin.js"></script>


</body>

</html>
