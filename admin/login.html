<!DOCTYPE html>
<html lang="pt-PT">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin | Yokimbo</title>


<style>

body {

    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;

}


.login-box {

    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);

}


h2 {

    text-align:center;
    color:#2FA84F;

}


input {

    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;

}


button {

    width:100%;
    padding:12px;
    background:#2FA84F;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;

}


button:hover {

    opacity:.85;

}


#error {

    color:red;
    text-align:center;
    margin-top:10px;

}


</style>


</head>


<body>


<div class="login-box">


<h2>
    Admin Yokimbo
</h2>


<input 
type="email" 
id="email" 
placeholder="Email">


<input 
type="password" 
id="password" 
placeholder="Senha">


<button id="loginBtn">
    Entrar
</button>


<div id="error"></div>


</div>



<script type="module" src="../js/auth.js"></script>


</body>


</html>
